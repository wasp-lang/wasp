min_version = "2026.5.7"

[tools]
"github:tfausak/cabal-gild" = "1.5.0.1"
"github:tweag/ormolu" = "0.7.2.0"
"mise-ghcup:cabal" = "3.12.1.0"

# Keep in sync with:
# - /waspc/cabal.project
# - /waspc/dev-tool.project
"mise-ghcup:ghc" = "9.6.7"

# Make sure that this version of HLS has a pre-built binary for the GHC version
# we use above.
"mise-ghcup:hls" = "2.12.0.0"

# Keep in sync with:
# - The compiler (Wasp.Node.Version).
# - The docs: /docs/introduction/quick-start.md ("Requirements" section).
# - The docs plugin: /web/src/remark/search-and-replace.ts
# - CI files that use Alpine (search for `alpine` in /.github).
node = "24.14.1"

# Manually configuring `ghcup` to be taken from GitHub releases, as the built-in
# tool doesn't support Windows (yet).
# https://github.com/cprecioso/aqua-registry/pull/1
[tool_alias]
ghcup = "github:haskell/ghcup-hs"

[tools."ghcup"]
version = "latest"
bin = "ghcup"

[plugins]
"mise-ghcup" = "https://github.com/cprecioso/mise-ghcup.git"

[settings]
lockfile = true
experimental = true
node.compile = false # The Node backend has a knack for compiling on Alpine even when it has a pre-built binary available.
