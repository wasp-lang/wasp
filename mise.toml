min_version = "2026.6.10"

[tools]
"aqua:ghcup" = "0.2.6.1"
"github:tfausak/cabal-gild" = "1.5.0.1"
"github:tweag/ormolu" = "0.7.2.0"
"mise-ghcup:cabal" = "3.12.1.0"

# Keep in sync with:
# - /waspc/cabal.project
# - /waspc/dev-tool.project
"mise-ghcup:ghc" = "9.6.7"

# Make sure that this version of HLS has a pre-built binary for the GHC version
# we use above.
"mise-ghcup:hls" = "2.12.0.0"

# Keep in sync with:
# - The compiler (Wasp.Node.Version).
# - The docs: /docs/introduction/quick-start.md ("Requirements" section).
# - The docs plugin: /web/src/remark/search-and-replace.ts
node = "24.14.1"

[plugins]
"vfox:mise-ghcup" = "https://github.com/cprecioso/mise-ghcup.git"

[settings]
lockfile = true
experimental = true
# The Node backend has a knack for compiling from source on Alpine even when it
# has a pre-built binary available. So we explicitly tell it not to.
node.compile = false

[bootstrap.packages]
# GHCup dependencies (https://www.haskell.org/ghcup/install/reqs/#linux-ubuntu)
"apt:build-essential" = "latest"
"apt:curl" = "latest"
"apt:libffi-dev" = "latest"
"apt:libgmp-dev" = "latest"
"apt:libncurses-dev" = "latest"
# Cabal dependencies
"apt:zlib1g-dev" = "latest"
