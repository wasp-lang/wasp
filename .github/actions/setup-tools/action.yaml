name: Setup dev tools
description: >
  This action sets up our Mise-defined dev tools and environment for use in
  actions. It also sets up caches for package manager dependencies.

runs:
  using: composite

  steps:
    - name: Install Mise
      uses: jdx/mise-action@v4
      env:
        # Loads `.config/mise/config.ci.toml` on top of `mise.toml`, which
        # disables dev-only tools that are not used in CI.
        MISE_ENV: ci
      with:
        bootstrap: true
        bootstrap_args: --update --yes

    - name: Persist Mise environment
      shell: bash
      # Write the MISE_ENV variable to the GitHub env so that future steps that
      # might include `mise install`s still don't pick up dev-only tools.
      run: echo "MISE_ENV=ci" >> "$GITHUB_ENV"

    - name: Cache npm dependencies
      uses: actions/setup-node@v6
      with:
        # We don't specify a node-version here because we already have it
        # installed. We use this step to setup the npm cache.
        cache: npm
        package-manager-cache: true

    - name: Cache Cabal dependencies
      uses: ./.github/actions/setup-cabal-cache
      with:
        cabal-project-dir: waspc
