name: Setup environment and dev tools
description: >
  This action sets up our Mise-defined dev tools and environment for use in
  actions. It also sets up caches for package manager dependencies.

runs:
  using: composite

  steps:
    - name: Install Mise
      uses: jdx/mise-action@v4
      with:
        bootstrap: true
        bootstrap_args: --update --yes

    - # Cabal inspects the version of the GHC binary to determine which compiler
      # to use. On Windows, Mise shims GHC in a way that Cabal cannot detect, so
      # we'll point it to the real GHC binary.
      name: Pin Cabal to the real GHC binary (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      working-directory: waspc
      run: |
        $ghc = (mise which ghc) -replace '\\', '/' # Convert to Unix-style path for Cabal
        "with-compiler: $ghc" | Set-Content -Path cabal.project.local -Encoding ascii

    - name: Cache npm dependencies
      uses: actions/setup-node@v6
      with:
        # We don't specify a Node version here, so it won't install any new one
        # and just use the one from Mise.
        cache: npm
        package-manager-cache: true

    - name: Cache Cabal dependencies
      uses: ./.github/actions/setup-cabal-cache
      with:
        cabal-project-dir: waspc
