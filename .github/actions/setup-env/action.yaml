name: Setup environment and dev tools
description: |
  This action sets up our Mise-defined dev tools and environment for use in
  actions. It also sets up caches for package manager dependencies.

inputs:
  cabal-project-dir:
    description: |
      The working directory for the action.
      The default is /waspc.
    required: false
    default: "waspc"

runs:
  using: composite

  steps:
    - name: Install Mise tools
      uses: jdx/mise-action@v4

    - name: Prefer real GHC binaries over Mise shims (Windows)
      # On Windows, Cabal can't determine the GHC version through Mise's
      # `ghc-<version>` shim: it probes the shim and gets back an empty version,
      # which breaks compiler detection. We prepend the real GHC bin directory
      # to PATH so Cabal finds the actual `ghc.exe` and `ghc-<version>.exe`
      # ahead of the shims.
      if: runner.os == 'Windows'
      shell: pwsh
      run: Split-Path -Parent (mise which ghc) >> $env:GITHUB_PATH

    - name: Cache npm dependencies
      uses: actions/setup-node@v6
      with:
        # We don't specify a Node version here, so it won't install any new one
        # and just use the one from Mise.
        cache: npm
        package-manager-cache: true

    - name: Probe environment
      id: probe
      shell: bash
      run: |
        set -euxo pipefail

        echo "GHC_VERSION=$(mise tool ghc --requested)" >> $GITHUB_OUTPUT
        echo "LIBC=$(ldd --version 2>&1 | grep -q musl && echo 'musl' || echo 'default')" >> $GITHUB_OUTPUT

        # The first run of `cabal path` has some extra messages telling you that
        # it's creating the store, so we run the command once to get rid of it.
        cabal path 2>&1 >/dev/null
        echo "CABAL_STORE=$(cabal path --store-dir)" >> $GITHUB_OUTPUT
        echo "CABAL_INDEX=$(cabal path --remote-repo-cache)" >> $GITHUB_OUTPUT

    # Based on the official recipe for Cabal caching:
    # https://github.com/actions/cache/blob/v5.0.4/examples.md#haskell---cabal
    - name: Cache Cabal dependencies
      uses: actions/cache@v5
      with:
        path: |
          ${{ steps.probe.outputs.CABAL_STORE }}
          ${{ steps.probe.outputs.CABAL_INDEX }}
          ${{ inputs.cabal-project-dir }}/dist-newstyle
        key: |
          cabal-${{ inputs.cabal-project-dir }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.probe.outputs.LIBC }}-${{ steps.probe.outputs.GHC_VERSION }}-${{ hashFiles(format('{0}/*.cabal', inputs.cabal-project-dir), format('{0}/*.project', inputs.cabal-project-dir), format('{0}/*.project.freeze', inputs.cabal-project-dir)) }}
        restore-keys: |
          cabal-${{ inputs.cabal-project-dir }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.probe.outputs.LIBC }}-${{ steps.probe.outputs.GHC_VERSION }}-

    - name: Update Cabal package index
      shell: bash
      run: cabal update
