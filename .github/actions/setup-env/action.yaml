name: Setup environment and dev tools
description: |
  This action sets up our Mise-defined dev tools and environment for use in
  actions. It also sets up caches for package manager dependencies.

inputs:
  cabal-project-dir:
    description: |
      The working directory for the action.
      The default is /waspc.
    required: false
    default: "waspc"

runs:
  using: composite

  steps:
    - name: Install system dependencies
      if: runner.os == 'Linux'
      shell: sh
      run: |
        # Detect Alpine via /etc/alpine-release. We can't rely on `uname`
        # because inside a container it reports the host kernel, not the
        # container's distro.
        # We can fold this step into Mise when apk packages are supported
        # (https://github.com/jdx/mise/discussions/10449) and curl is no longer
        # needed to use the Mise action
        # (https://github.com/jdx/mise/discussions/10488).

        if [ -f /etc/alpine-release ]; then
          # GHCup dependencies (https://www.haskell.org/ghcup/install/reqs/#linux-alpine)
          apk add binutils-gold curl gcc g++ gmp-dev gmp-static libc-dev libffi-dev make musl-dev ncurses-dev perl pkgconfig tar xz
          # `./run` script dependencies
          apk add bash
          # Cabal dependencies
          apk add zlib-dev zlib-static
          # Prisma dependencies
          apk add openssl
        else
          # If we have sudo, we need to use it to install dependencies. If we
          # don't have sudo, we assume we're running as root and can just use
          # apt-get directly.
          if command -v sudo >/dev/null 2>&1; then
            APT_GET="sudo apt-get"
          else
            APT_GET="apt-get"
          fi

          export DEBIAN_FRONTEND=noninteractive
          $APT_GET update -y
          # GHCup dependencies (https://www.haskell.org/ghcup/install/reqs/#linux-ubuntu)
          $APT_GET install -y build-essential curl libffi-dev libgmp-dev libncurses-dev
          # Cabal dependencies
          $APT_GET install -y zlib1g-dev
        fi

    - name: Install Mise
      uses: jdx/mise-action@v4

    - # `cabal.project` sets `with-compiler: x.y.z`, so Cabal resolves the bare
      # program name `ghc-x.y.z` on PATH. On Windows, that hits Mise's shim,
      # which Cabal can't determine the version of, and the build fails. We
      # override `with-compiler` with the absolute path to the real `ghc.exe` so
      # Cabal probes the actual binary instead of the shim. Using forward
      # slashes keeps Cabal's config parser happy.
      name: Pin Cabal to the real GHC binary (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      working-directory: ${{ inputs.cabal-project-dir }}
      run: |
        $ghc = (mise which ghc) -replace '\\', '/'
        "with-compiler: $ghc" | Set-Content -Path cabal.project.local -Encoding ascii

    - name: Cache npm dependencies
      uses: actions/setup-node@v6
      with:
        # We don't specify a Node version here, so it won't install any new one
        # and just use the one from Mise.
        cache: npm
        package-manager-cache: true

    - name: Probe environment
      id: probe
      shell: bash
      run: |
        set -euxo pipefail

        echo "GHC_VERSION=$(mise tool ghc --requested)" >> $GITHUB_OUTPUT

        # Detect the libc so the Cabal cache key keeps glibc and musl builds
        # apart.
        ldd_version="$(ldd --version 2>&1 || true)"
        case "$ldd_version" in
          *musl*) libc=musl ;;
          *) libc=default ;;
        esac
        echo "LIBC=$libc" >> "$GITHUB_OUTPUT"

        # The first run of `cabal path` has some extra messages telling you that
        # it's creating the store, so we run the command once to get rid of it.
        cabal path 2>&1 >/dev/null
        echo "CABAL_STORE=$(cabal path --store-dir)" >> $GITHUB_OUTPUT
        echo "CABAL_INDEX=$(cabal path --remote-repo-cache)" >> $GITHUB_OUTPUT

    # Based on the official recipe for Cabal caching:
    # https://github.com/actions/cache/blob/v5.0.4/examples.md#haskell---cabal
    - name: Cache Cabal dependencies
      uses: actions/cache@v5
      with:
        path: |
          ${{ steps.probe.outputs.CABAL_STORE }}
          ${{ steps.probe.outputs.CABAL_INDEX }}
          ${{ inputs.cabal-project-dir }}/dist-newstyle
        key: |
          cabal-v2-${{ inputs.cabal-project-dir }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.probe.outputs.LIBC }}-${{ steps.probe.outputs.GHC_VERSION }}-${{ hashFiles(format('{0}/*.cabal', inputs.cabal-project-dir), format('{0}/*.project', inputs.cabal-project-dir), format('{0}/*.project.freeze', inputs.cabal-project-dir)) }}
        restore-keys: |
          cabal-v2-${{ inputs.cabal-project-dir }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.probe.outputs.LIBC }}-${{ steps.probe.outputs.GHC_VERSION }}-

    - name: Update Cabal package index
      shell: bash
      run: cabal update
