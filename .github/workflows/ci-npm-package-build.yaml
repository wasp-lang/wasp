name: "Build - Wasp npm packages"

on:
  workflow_call:
    inputs:
      build-outputs-json:
        description: "The returned outputs from the build workflow, as a JSON string"
        required: true
        type: string

      override-npm-package-version:
        description: >
          If set, overrides the version of npm packages to publish.
          Useful for publishing an RC version.
          Leading 'v' will be stripped if present.
        required: false
        type: string

env:
  WASP_TELEMETRY_DISABLE: 1

jobs:
  npm-packaging-metadata:
    runs-on: ubuntu-latest

    name: Compute npm packaging metadata
    steps:
      - name: Create metadata file
        env:
          INPUT_DATA_JSON: ${{ inputs.build-outputs-json }}
          OVERRIDE_VERSION_JSON: ${{ inputs.override-npm-package-version && toJson(inputs.override-npm-package-version) || 'null' }}
          JQ_PROGRAM:
            # The schema for this file is at `scripts/make-npm-packages/src/schema/input-data.ts`.
            # We'll wrangle the data from the build jobs into that schema here.
            |
            {
              version: ($overrideVersion // $inputData.waspc_version) | ltrimstr("v"),
              tarballs:
                $inputData
                | with_entries(select(.key | startswith("output_")))
                | map(
                    fromjson
                    | {
                        fileName: .["tarball-name"],
                        target: (.["npm-target"] | fromjson)
                      }
                  )
            }
        run: |
          jq \
            --null-input \
            --argjson inputData "$INPUT_DATA_JSON" \
            --argjson overrideVersion "$OVERRIDE_VERSION_JSON" \
            "$JQ_PROGRAM" \
            > ./data.json

      - name: Print npm package metadata for debugging
        run: cat ./data.json

      - name: Set output
        id: set-output
        run: |
          {
            echo 'NPM_PACKAGING_METADATA_JSON<<EOF'
            cat ./data.json
            echo 'EOF'
          } >> $GITHUB_OUTPUT

    outputs:
      NPM_PACKAGING_METADATA_JSON: ${{ steps.set-output.outputs.NPM_PACKAGING_METADATA_JSON }}

  make-cli-npm-packages:
    runs-on: ubuntu-latest
    needs: npm-packaging-metadata

    name: Make Wasp CLI npm packages

    env:
      NPM_PACKAGING_METADATA_JSON: ${{ needs.npm-packaging-metadata.outputs.NPM_PACKAGING_METADATA_JSON }}

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-tools

      - name: Compute artifact names for download
        uses: ./.github/actions/compute-artifact-names
        id: compute-download-artifact-names
        with:
          build-name: all

      - uses: actions/download-artifact@v8
        with:
          path: "./download/"
          pattern: ${{ steps.compute-download-artifact-names.outputs.artifact-name }}

      - name: Copy artifacts to input folder
        env:
          ARTIFACT_NAME: ${{ steps.compute-download-artifact-names.outputs.artifact-name }}
        run: |
          mkdir -p ./input/
          cp ./download/${ARTIFACT_NAME}/* ./input/

      - name: Write metadata file
        run: |
          cat <<<"$NPM_PACKAGING_METADATA_JSON" > ./input/data.json

      - name: Install dependencies for script
        working-directory: ./scripts/make-npm-packages
        run: npm ci

      - name: Run packager script
        run: node ./scripts/make-npm-packages/src/index.ts --input-dir ./input/ --output-dir ./output/

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ vars.WASP_NPM_ARTIFACT_NAME }}
          include-hidden-files: true
          path: ./output/

  make-supporting-packages:
    runs-on: ubuntu-latest
    needs: npm-packaging-metadata

    name: Make Wasp supporting npm packages

    env:
      ARTIFACTS_DIR: ./output
      NPM_PACKAGING_METADATA_JSON: ${{ needs.npm-packaging-metadata.outputs.NPM_PACKAGING_METADATA_JSON }}
      PACKAGES:
        # We don't use a matrix since we need a single job. This is because the
        # upload step needs to upload all packages at once in a single job,
        # instead of each job doing their own upload.
        |
        waspc/data/packages/spec

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-tools

      - name: Build and pack
        run: |
          set -euxo pipefail

          VERSION=$(jq <<<"$NPM_PACKAGING_METADATA_JSON" -r '.version')

          mkdir -p "$ARTIFACTS_DIR"

          for package in $PACKAGES; do
            cd "$GITHUB_WORKSPACE/$package"

            echo "Building and packing $package"
            npm ci
            npm run build

            # Keep the published version in sync with the CLI packages (matters
            # only when override-npm-package-version is set).
            npm version --no-git-tag-version --allow-same-version "$VERSION"

            npm pack --pack-destination "$ARTIFACTS_DIR"
          done

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ vars.WASP_SUPPORTING_PACKAGES_ARTIFACT_NAME }}
          include-hidden-files: true
          path: ${{ env.ARTIFACTS_DIR }}
