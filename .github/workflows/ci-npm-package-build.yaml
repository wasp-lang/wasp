name: "Build - Wasp npm packages"

on:
  workflow_call:
    inputs:
      build-outputs-json:
        description: "The returned outputs from the build workflow, as a JSON string"
        required: true
        type: string

      override-npm-package-version:
        description: >
          If set, overrides the version of npm packages to publish.
          Useful for publishing an RC version.
          Leading 'v' will be stripped if present.
        required: false
        type: string

env:
  WASP_TELEMETRY_DISABLE: 1

jobs:
  make-npm-packages:
    runs-on: ubuntu-latest

    name: Make npm packages

    env:
      WASPC_DOWNLOAD_DIR_PATH: ${{ github.workspace }}/download
      PACKAGES_INPUT_DIR_PATH: ${{ github.workspace }}/input
      PACKAGES_INPUT_DATA_FILE_PATH: ${{ github.workspace }}/input/data.json
      PACKAGES_OUTPUT_DIR_PATH: ${{ github.workspace }}/output

      # These are packages that live in the repo and are published as-is (as
      # opposed to the CLI packages, which are generated by the packager script
      # above). We build eveything in a single job so all packages end up in a
      # single artifact, which both the nightly (pkg.pr.new) and the release
      # (npm) publish workflows pick up.
      SUPPORTING_PACKAGES: |
        waspc/data/packages/spec

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-tools

      - name: Compute artifact names for download
        uses: ./.github/actions/compute-artifact-names
        id: compute-download-artifact-names
        with:
          build-name: all

      - uses: actions/download-artifact@v8
        with:
          path: ${{ env.WASPC_DOWNLOAD_DIR_PATH }}
          pattern: ${{ steps.compute-download-artifact-names.outputs.artifact-name }}

      - name: Copy artifacts to input folder
        env:
          ARTIFACT_NAME: ${{ steps.compute-download-artifact-names.outputs.artifact-name }}
        run: |
          mkdir -p "$PACKAGES_INPUT_DIR_PATH"
          cp "$WASPC_DOWNLOAD_DIR_PATH"/"$ARTIFACT_NAME"/* "$PACKAGES_INPUT_DIR_PATH/"

      - name: Create build metadata file
        env:
          INPUT_DATA_JSON: ${{ inputs.build-outputs-json }}
          OVERRIDE_VERSION_JSON: ${{ inputs.override-npm-package-version && toJson(inputs.override-npm-package-version) || 'null' }}
          JQ_PROGRAM:
            # The schema for this file is at `scripts/make-npm-packages/src/schema/input-data.ts`.
            # We'll wrangle the data from the build jobs into that schema here.
            |
            {
              version: ($overrideVersion // $inputData.waspc_version) | ltrimstr("v"),
              tarballs:
                $inputData
                | with_entries(select(.key | startswith("output_")))
                | map(
                    fromjson
                    | {
                        fileName: .["tarball-name"],
                        target: (.["npm-target"] | fromjson)
                      }
                  )
            }
        run: >
          jq
          --null-input
          --argjson inputData "$INPUT_DATA_JSON"
          --argjson overrideVersion "$OVERRIDE_VERSION_JSON"
          "$JQ_PROGRAM"
          >"$PACKAGES_INPUT_DATA_FILE_PATH"

          cat "$PACKAGES_INPUT_DATA_FILE_PATH" # For debugging purposes

      - name: Install dependencies for script
        working-directory: ./scripts/make-npm-packages
        run: npm ci

      - name: Run packager script
        run: >
          node ./scripts/make-npm-packages/src/index.ts
          --input-dir "$PACKAGES_INPUT_DIR_PATH"
          --output-dir "$PACKAGES_OUTPUT_DIR_PATH"

      - name: Build supporting packages
        run: |
          set -euxo pipefail

          version=$(jq -r <"$PACKAGES_INPUT_DATA_FILE_PATH" '.version')

          for package in $SUPPORTING_PACKAGES; do
            echo "Building $package"

            cd "$GITHUB_WORKSPACE/$package"

            npm ci
            npm run build

            # Keep the published version in sync with the CLI packages (matters
            # only when override-npm-package-version is set).
            npm version --no-git-tag-version --allow-same-version "$version"

            # `npm pack` prunes the package down to its publishable files. We
            # then extract it back into a folder because `pkg-pr-new publish`
            # only accepts package directories, not tarballs.
            PACK_DIR=$(mktemp -d)
            npm pack --pack-destination "$PACK_DIR"

            PACKAGE_OUTPUT_DIR="$PACKAGES_OUTPUT_DIR_PATH/$(basename "$package")"
            mkdir -p "$PACKAGE_OUTPUT_DIR"
            tar -xzf "$PACK_DIR"/*.tgz -C "$PACKAGE_OUTPUT_DIR" --strip-components=1
          done

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ vars.WASP_NPM_ARTIFACT_NAME }}
          include-hidden-files: true
          path: ${{ env.PACKAGES_OUTPUT_DIR_PATH }}
