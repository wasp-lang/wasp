name: "Release - Check, build, and upload binaries"

on:
  push:
    tags:
      - v*

concurrency:
  group: "release-create"
  cancel-in-progress: true

jobs:
  ci:
    # We call a top-level workflow here, so it needs many permissions to do its
    # job. The workflow itself is already checked by zizmor too, so we can
    # safely ignore this warning here.
    # zizmor: ignore[excessive-permissions]
    uses: ./.github/workflows/ci.yaml
    secrets:
      # (Same comment as above)
      # zizmor: ignore[secrets-inherit]
      inherit
    with:
      override-npm-package-version: ${{ github.ref_name }}

  # In the following jobs we don't want to pick up the CI caches, avoiding a
  # potential cache poisoning attack that is not observable in the stored
  # artifacts. So we exceptionally don't use our `setup-tools` actions. See
  # https://docs.zizmor.sh/audits/#cache-poisoning for more details.

  create-release:
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wasp-cli-*

      # `download-artifact` will download each artifact into its own separate
      # directory. We need to account for this in the glob pattern for the
      # release artifacts. The glob should only include the files inside the
      # folders, not the folders themselves.

      - name: Create Github release
        env:
          REF_NAME: ${{ github.ref_name }}
          # Env for the `gh` CLI tool
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create --draft --verify-tag ${REF_NAME} "./wasp-cli-*/*"

  publish-npm:
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # Both artifacts are downloaded into the same folder so the publish loop
      # below picks them all up. The CLI artifact holds package directories; the
      # supporting-packages artifact holds `.tgz` tarballs. `npm publish`
      # accepts both.
      - uses: actions/download-artifact@v8
        with:
          name: ${{ vars.WASP_NPM_ARTIFACT_NAME }}
          path: packages/

      - uses: actions/download-artifact@v8
        with:
          name: ${{ vars.WASP_SUPPORTING_PACKAGES_ARTIFACT_NAME }}
          path: packages/

      - name: Publish Wasp npm packages
        # Tokenless npm publishing requires npm v11.5.1+ so we request it
        # explicitly.
        # Read more: https://docs.npmjs.com/trusted-publishers/
        run: |
          set -x # Log each command for debugging
          for pkg in ./packages/*; do
            # The tag name has no special meaning, just avoids us
            # broadly publishing an RC to the "latest" tag.
            npx npm@^11.5.1 publish --tag rc "$pkg"
          done
