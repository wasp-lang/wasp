name: "Check - Formatting"

on:
  workflow_call:

env:
  WASP_TELEMETRY_DISABLE: 1

permissions:
  contents: read

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-tools
