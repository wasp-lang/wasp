name: "Check - Autofix formatting"

on:
  workflow_call:

env:
  WASP_TELEMETRY_DISABLE: 1

permissions:
  contents: write

jobs:
  formatting:
    runs-on: ubuntu-latest
    steps:
      - run: |
          git config --global core.autocrlf input
          git config --global core.eol lf

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          cache: "npm"
          node-version-file: .nvmrc

      - name: Parse tool versions
        id: parse-tool-versions
        working-directory: waspc
        run: |
          echo "ORMOLU_VERSION=$(grep 'ormolu ==' dev-tool.project | sed 's/.*==\s*\([0-9.]*\).*/\1/')" >> $GITHUB_OUTPUT
          echo "CABAL_GILD_VERSION=$(grep 'cabal-gild ==' dev-tool.project | sed 's/.*==\s*\([0-9.]*\).*/\1/')" >> $GITHUB_OUTPUT

      - name: Run Prettier
        run: |
          npm ci
          npm run format:prettier

      # `run-ormolu` versions > 15 require ormolu version >= 0.7.5.0
      - uses: haskell-actions/run-ormolu@v15
        with:
          version: ${{ steps.parse-tool-versions.outputs.ORMOLU_VERSION }}
          mode: inplace

      - uses: tfausak/cabal-gild-setup-action@v2
        with:
          version: ${{ steps.parse-tool-versions.outputs.CABAL_GILD_VERSION }}

      - name: Run cabal-gild
        working-directory: waspc
        run: |
          for f in $(git ls-files '*.cabal'); do
            cabal-gild --mode format --io "$f"
          done

      - name: Check for changes
        id: check-for-changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "CHANGES_DETECTED=1" >> $GITHUB_OUTPUT
          else
            echo "CHANGES_DETECTED=0" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: ${{ steps.check-for-changes.outputs.CHANGES_DETECTED == '1' && github.event_name == 'pull_request' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "Auto-fix formatting issues"
          git push

      - name: Fail if changes were detected
        if: ${{ steps.check-for-changes.outputs.CHANGES_DETECTED == '1' && github.event_name != 'pull_request' }}
        run: |
          echo "Formatting issues were detected. Please review the changes and ensure they are correct."
          exit 1
