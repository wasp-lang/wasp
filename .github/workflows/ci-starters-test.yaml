name: "Test - Starters"

on:
  workflow_call:

env:
  WASP_TELEMETRY_DISABLE: 1

jobs:
  test-starters:
    name: "Test starters on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-tools

      - uses: ./.github/actions/install-wasp-cli-artifact

      - name: Install node dependencies
        working-directory: waspc/starters-e2e-tests
        run: npm ci

      - name: Run starters e2e tests
        working-directory: waspc/starters-e2e-tests
        run: npm run test:dev
