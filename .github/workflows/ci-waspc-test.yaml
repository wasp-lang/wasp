name: "Test - waspc"

on:
  workflow_call:
  workflow_dispatch:

env:
  WASP_TELEMETRY_DISABLE: 1

defaults:
  run:
    shell: bash
    working-directory: waspc

permissions:
  contents: read

jobs:
  test:
    name: Test waspc (${{ matrix.os }}, ${{ matrix.extra-tools || 'default' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          # We are using a fixed Ubuntu version instead of 'ubuntu-latest' to
          # prevent the version from changing on its own.
          - ubuntu-22.04
          - ubuntu-24.04-arm
          - macos-15-intel
          - macos-15 # Apple Silicon
          - windows-latest
        extra-tools:
          - node@latest

        # In addition to the default matrix, we also want to run the build job for
        # additional Node.js versions, to make sure that Wasp works with them.
        # To reduce the number of jobs, we only test the Node.js versions on
        # Ubuntu 22.04.
        include:
          - # No extra tool here, so we use our default Node.js version, which
            # comes from mise and is equal to our lowest supported one.
            os: ubuntu-22.04

    steps:
      - # For waspc parser tests, we need to make sure git doesn't convert line
        # endings to CRLF during checkout on Windows because that would cause
        # the test cases to fail.
        name: Configure git
        working-directory:
          # This gets flagged by the GitHub Actions language server as an
          # incorrect type, but it actually works. Wrapping it in quotes makes
          # the language server happy but changes the interpretation on the
          # runner, and breaks the workflow. So don't do it.
          ~
        run: |
          git config --global core.autocrlf input
          git config --global core.eol lf

      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-tools

      - name: Compile TS packages and libs
        run: |
          ./run build:packages
          ./run build:libs

      - name: Build external dependencies
        run: cabal build --enable-tests --enable-benchmarks --only-dependencies

      - name: Build wasp code
        run: cabal build all

      - name: Run unit tests
        run: cabal test wasp-cli-tests waspc-tests

      - name: Run `waspc` e2e tests
        env:
          WASP_E2E_TESTS_SKIP_DOCKER: ${{ runner.os == 'macOS' && '1' || '' }}
          EXTRA_TOOLS: ${{ matrix.extra-tools }}
        run: |
          mise x "${EXTRA_TOOLS[@]}" -- bash ./run test:waspc:e2e
