name: "Test - Wasp Libs"

on:
  workflow_call:

env:
  WASP_TELEMETRY_DISABLE: 1

jobs:
  test-libs:
    name: Test Wasp libs
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node

      - name: Test all libs
        working-directory: waspc
        run: ./run test:libs
