name: "Test - TS Spec"

on:
  workflow_call:

env:
  WASP_TELEMETRY_DISABLE: 1

jobs:
  test-wasp-spec:
    name: Test @wasp.sh/spec
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-env

      - name: Install @wasp.sh/spec dependencies
        working-directory: waspc/data/packages/spec
        run: npm ci

      - name: Run @wasp.sh/spec tests
        working-directory: waspc/data/packages/spec
        run: npm run test
