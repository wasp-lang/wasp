name: "Test - Wasp npm packages"

on:
  workflow_call:
    inputs:
      data-files-list:
        description: "Expected data files list with per-file SHA-256 hashes."
        required: true
        type: string

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - # Regular Linux with Glibc
            os: ubuntu-latest

          - # Linux with Musl
            os: ubuntu-latest
            container: node:22-alpine
            install-deps: apk add curl

          - # Apple Silicon
            os: macos-latest

          - # Apple Intel
            os: macos-15-intel

    name: "${{ matrix.runner.container || matrix.runner.os }}"

    runs-on: ${{ matrix.runner.os }}
    container: ${{ matrix.runner.container }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          name: ${{ vars.WASP_NPM_ARTIFACT_NAME }}
          path: packages/

      - name: Install dependencies
        if: matrix.runner.install-deps
        run: ${{ matrix.runner.install-deps }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Publish and run Wasp npm packages
        env:
          TEST_REGISTRY_URL: http://localhost:4873
          TEST_REGISTRY_CONFIG: |
            storage: "$HOME/.verdaccio/storage"
            log: { type: stdout, format: pretty, level: info }
            max_body_size: 1000mb # Needed because Wasp packages are large
            packages: { '**': { access: $all, publish: $all } }
        run: |
          set -eux

          # Install global packages
          npm install -g npm-cli-login@1 verdaccio@6

          # Create registry config
          mkdir -p "$HOME/.config/verdaccio"
          echo "$TEST_REGISTRY_CONFIG" > "$HOME/.config/verdaccio/config.yaml"

          # Start local registry
          verdaccio &

          # Wait for registry to be ready
          until curl -sSf "$TEST_REGISTRY_URL/-/ping" >/dev/null; do
            sleep 1
          done

          # Set registry and login
          npm-cli-login -u fake-user -p fake-password -e fake@email.com -r "$TEST_REGISTRY_URL"
          npm config set registry "$TEST_REGISTRY_URL"

          # Publish all packages to the test registry
          for pkg_dir in ./packages/*; do
            npm publish "$pkg_dir"
          done

          # Test installing and using the Wasp CLI from the test registry
          # We'll enable debug logging in the wrapper to see if it can find and run the Wasp binary.
          NODE_DEBUG=wasp-bin-wrapper npx -y @wasp.sh/wasp-cli version

          exit 0 # Done, do not wait for registry to exit

  check-data-files:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build-name:
          - linux-x86_64
          - linux-x86_64-static
          - macos-x86_64
          - macos-aarch64

    name: "Check data files (${{ matrix.build-name }})"

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/compute-artifact-names
        id: artifact
        with:
          build-name: ${{ matrix.build-name }}

      - uses: actions/download-artifact@v8
        with:
          name: ${{ vars.WASP_NPM_ARTIFACT_NAME }}
          path: packages/

      - name: Install sub-package into test project
        id: install
        env:
          NPM_TARGET: ${{ steps.artifact.outputs.npm-target }}
        run: |
          set -eux

          # Extract platform fields from the npm-target JSON.
          # "unknown" is the placeholder for platforms without libc (e.g. macOS),
          # matching the UNDEFINED_LIBC_NAME convention in the packager script.
          os=$(echo "$NPM_TARGET" | jq -r '.os')
          cpu=$(echo "$NPM_TARGET" | jq -r '.cpu')
          libc=$(echo "$NPM_TARGET" | jq -r '.libc // "unknown"')

          pkg_name="@wasp.sh/wasp-cli-${os}-${cpu}-${libc}"
          pkg_dir="./packages/wasp-sh-wasp-cli-${os}-${cpu}-${libc}"

          # Pack the sub-package
          mkdir packed-tarballs
          tarball=$(npm pack --pack-destination ./packed-tarballs "$pkg_dir")

          # Create a test project and install the package
          mkdir install-test
          cd install-test
          npm init -y

          # Override npm's platform detection so it accepts packages built for
          # a different os/cpu/libc than the runner (e.g. macOS packages on Linux).
          # Only pass --libc for platforms that actually declare it (Linux).
          npm_flags=(--os="$os" --cpu="$cpu")
          if [ "$libc" != "unknown" ]; then
            npm_flags+=(--libc="$libc")
          fi

          npm install "../packed-tarballs/$tarball" "${npm_flags[@]}"

          echo "installed-pkg-dir=install-test/node_modules/${pkg_name}" >> "$GITHUB_OUTPUT"

      - name: Generate list of installed data files
        run: |
          set -eux

          pkg_dir="${{ steps.install.outputs.installed-pkg-dir }}"

          # Walk the data directory and produce a tab-separated manifest of
          # relative paths and their SHA-256 hashes, to compare against the
          # expected list from the build step.
          (cd "$pkg_dir" && find ./data -type f | while IFS= read -r file; do
            hash=$(sha256sum "$file" | cut -d' ' -f1)
            printf '%s\t%s\n' "$file" "$hash"
          done) > actual-data-files.txt

      - name: Verify data files match
        env:
          EXPECTED_DATA_FILES: ${{ inputs.data-files-list }}
        run: |
          set -eux

          echo "$EXPECTED_DATA_FILES" > expected-data-files.txt
          
          # Both lists are sorted before comparison so file discovery order
          # doesn't cause spurious failures.
          diff <(sort expected-data-files.txt) <(sort actual-data-files.txt)
