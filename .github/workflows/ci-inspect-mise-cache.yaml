name: "Inspect mise caches"

# Debug helper: restores specific mise caches (saved by jdx/mise-action) and
# re-uploads their contents as artifacts so we can download and inspect them.
# `jdx/mise-action` caches a single directory (its `miseDir()`) per platform,
# keyed by the runner image (`macos15`, `win25`, `self-hosted`, ...), so each
# cache must be restored on a runner of the matching OS family.
#
# We never trigger this workflow directly; it is called from `ci.yaml`.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    strategy:
      fail-fast: false
      matrix:
        cache:
          - mise-v1-linux-x64-self-hosted-d0aec125fb3244539cee50338e5e91a2c46ca6cd2fc334a32cf675a93e370ed3-b210cf62f6fd90882f2221bce0c8708975d42a746168951ca4a7ec78a8505e7e
          - mise-v1-windows-x64-win25-vs2026-d0aec125fb3244539cee50338e5e91a2c46ca6cd2fc334a32cf675a93e370ed3-b210cf62f6fd90882f2221bce0c8708975d42a746168951ca4a7ec78a8505e7e
          - mise-v1-linux-x64-musl-self-hosted-d0aec125fb3244539cee50338e5e91a2c46ca6cd2fc334a32cf675a93e370ed3-b210cf62f6fd90882f2221bce0c8708975d42a746168951ca4a7ec78a8505e7e
          - mise-v1-macos-x64-macos15-d0aec125fb3244539cee50338e5e91a2c46ca6cd2fc334a32cf675a93e370ed3-b210cf62f6fd90882f2221bce0c8708975d42a746168951ca4a7ec78a8505e7e
          - mise-v1-macos-arm64-macos15-d0aec125fb3244539cee50338e5e91a2c46ca6cd2fc334a32cf675a93e370ed3-b210cf62f6fd90882f2221bce0c8708975d42a746168951ca4a7ec78a8505e7e
          - mise-v1-linux-x64-ubuntu24-d0aec125fb3244539cee50338e5e91a2c46ca6cd2fc334a32cf675a93e370ed3-b210cf62f6fd90882f2221bce0c8708975d42a746168951ca4a7ec78a8505e7e
          - mise-v1-linux-x64-ubuntu22-d0aec125fb3244539cee50338e5e91a2c46ca6cd2fc334a32cf675a93e370ed3-b210cf62f6fd90882f2221bce0c8708975d42a746168951ca4a7ec78a8505e7e

    runs-on: ubuntu-latest
    name: Inspect mise cache (${{ matrix.cache }})

    steps:
      - name: Restore mise cache
        uses: actions/cache/restore@v6
        id: restore-cache
        with:
          key: ${{ matrix.cache }}
          path: ${{ runner.temp}}/dump
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - name: Upload cache as artifact
        uses: actions/upload-artifact@v7
        with:
          name: mise-cache-dump-${{ matrix.cache }}
          path: ${{ runner.temp}}/dump
          if-no-files-found: error
